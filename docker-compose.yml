version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: vel_web_mysql
    restart: always
    env_file:
          - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - vel_web_net

  api:
    build: ./api
    container_name: vel_web_api
    restart: always
    env_file:
      - .env
    ports:
      - "${PORT}:3000"
    volumes:
      - ./api:/usr/src/app
    depends_on:
      - mysql
    networks:
      - vel_web_net
    command: npm run dev

volumes:
  mysql_data:

networks:
  vel_web_net:
